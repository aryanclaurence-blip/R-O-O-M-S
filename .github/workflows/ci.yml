name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    name: Static Analysis & Linting
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy black bandit

      - name: Code Formatting Check (Black)
        run: black --check RoomDimensionManager.extension/lib/rdm/

      - name: Linting (Flake8)
        run: flake8 RoomDimensionManager.extension/lib/rdm/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Type Checking (MyPy)
        run: mypy RoomDimensionManager.extension/lib/rdm/ --ignore-missing-imports

      - name: Security Scan (Bandit)
        run: bandit -r RoomDimensionManager.extension/lib/rdm/ -c bandit.yaml || true

  unit-tests:
    name: Unit & Integration Testing
    runs-on: windows-latest
    needs: static-analysis
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install Test Dependencies
        run: |
          pip install pytest pytest-cov mock

      - name: Run Unit Tests
        run: pytest tests/unit/ --cov=RoomDimensionManager.extension/lib/rdm --cov-report=xml

      - name: Run Integration Tests
        run: pytest tests/integration/

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage.xml

  package-release:
    name: Build & Package Release
    runs-on: windows-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Generate Version Manifest
        run: |
          # PowerShell script to generate version.json based on Git SHA and Tag
          ./scripts/generate_manifest.ps1

      - name: Build Installer (InnoSetup)
        run: |
          # PowerShell script calling InnoSetup Compiler
          ./scripts/build_installer.ps1

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: RoomDimensionManager-Installer
          path: build/RoomDimensionManager_Setup.exe
